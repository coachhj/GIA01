<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>그래머 인 유스 · 라이트너 학습기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#213257;
    --bg-bot:#0D1526;
    --panel:#1B2743;
    --panel-2:#22304F;
    --border:#33436B;
    --border-soft:#3E4E76;
    --text:#F3F5FA;
    --text-soft:#8C97B4;
    --gold:#E8B84B;
    --gold-deep:#C8942F;
    --blue:#4C7EF3;
    --green:#3FBF8F;
    --red:#E2637A;
    --radius:16px;
    --shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
    background-attachment:fixed;
    color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%; max-width:480px; min-height:100vh;
    display:flex; flex-direction:column; position:relative;
    padding-bottom:56px;
  }
  header.top{
    padding:22px 20px 14px;
    display:flex; align-items:baseline; justify-content:space-between;
  }
  header.top .brand{
    font-family:'Noto Serif KR',serif; font-weight:700; font-size:20px; color:var(--text); letter-spacing:-0.01em;
  }
  header.top .brand small{
    display:block; font-family:'Inter',sans-serif; font-weight:600; font-size:10.5px;
    letter-spacing:0.09em; color:var(--text-soft); text-transform:uppercase; margin-top:3px;
  }
  .icon-btn{
    background:var(--panel-2); border:1px solid var(--border); cursor:pointer;
    color:var(--text); font-size:18px; width:38px; height:38px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:active{ background:var(--border); }
  .endbtn{
    background:var(--panel-2); border:1px solid var(--red); color:var(--red);
    font-size:12px; font-weight:700; padding:8px 12px; border-radius:12px; cursor:pointer;
  }
  .endbtn:active{ background:rgba(226,99,122,0.15); }
  main{ flex:1; padding:0 20px 24px; display:flex; flex-direction:column; gap:18px; }

  /* ---------- shelf ---------- */
  .shelf{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px 18px 16px; }
  .shelf-title{ font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-soft); font-weight:700; margin-bottom:12px; }
  .shelf-row{ display:flex; gap:8px; align-items:flex-end; height:76px; }
  .book{ flex:1; background:var(--panel-2); border-radius:5px 5px 3px 3px; position:relative; display:flex; align-items:flex-end; justify-content:center; overflow:hidden; border:1px solid var(--border); }
  .book .fill{ width:100%; background:linear-gradient(180deg,var(--gold),var(--gold-deep)); transition:height .5s cubic-bezier(.2,.8,.2,1); }
  .book .num{ position:absolute; top:6px; left:0; right:0; text-align:center; font-size:11px; font-weight:700; color:var(--text-soft); }
  .book .count{ position:absolute; bottom:4px; left:0; right:0; text-align:center; font-size:12px; font-weight:800; color:#1B2743; text-shadow:none; }
  .shelf-caption{ display:flex; justify-content:space-between; margin-top:10px; font-size:11px; color:var(--text-soft); }

  .pillrow{ display:flex; gap:10px; }
  .pill{ flex:1; background:var(--panel); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); padding:14px 12px; text-align:center; }
  .pill .n{ font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; color:var(--gold); }
  .pill .l{ font-size:11px; color:var(--text-soft); margin-top:2px; }

  .cta{
    background:linear-gradient(180deg,var(--gold),var(--gold-deep));
    color:#1B2743; border:none; border-radius:var(--radius); padding:22px 20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer; box-shadow:0 8px 20px rgba(200,148,47,0.35); transition:transform .15s ease;
  }
  .cta:active{ transform:scale(0.98); }
  .cta .big{ font-family:'Noto Serif KR',serif; font-size:20px; font-weight:700; }
  .cta .small{ font-size:12px; opacity:0.75; font-weight:600; }

  .secrow{ display:flex; gap:10px; }
  .secbtn{ flex:1; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:13px 4px; text-align:center; font-size:11.5px; font-weight:600; color:var(--text); cursor:pointer; line-height:1.4; }
  .secbtn:active{ background:var(--panel-2); }

  .emptynote{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; font-size:13px; color:var(--text-soft); line-height:1.6; }

  /* ---------- study screen ---------- */
  .studytop{ padding:6px 20px 0; display:flex; justify-content:center; }
  .daytag{ font-size:11px; color:var(--text-soft); background:var(--panel); border:1px solid var(--border); padding:4px 12px; border-radius:20px; }
  .dots{ display:flex; justify-content:center; gap:7px; padding:16px 20px 0; }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--border-soft); }
  .dot.active{ background:var(--gold); width:20px; border-radius:5px; transition:all .25s ease; }

  .studycard{ padding:18px 20px 0; text-align:center; }
  .studycard .kr{ font-family:'Noto Serif KR',serif; font-size:23px; font-weight:700; line-height:1.5; color:var(--text); }
  .studycard .meta{ font-size:12.5px; color:var(--text-soft); margin-top:8px; font-weight:600; }

  .answerbox{
    margin:20px 20px 0; border:1.5px dashed var(--border-soft); border-radius:var(--radius);
    background:rgba(255,255,255,0.02); padding:26px 20px; min-height:64px;
    display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer;
  }
  .answerbox .hint{ font-size:13.5px; color:var(--text-soft); font-weight:500; }
  .answerbox .en{ font-size:18px; font-weight:700; color:var(--gold); line-height:1.5; }

  .ctrlrow{ display:flex; justify-content:center; gap:16px; padding:20px 20px 0; }
  .ctrlbtn{
    width:52px; height:52px; border-radius:50%; background:var(--panel-2); border:1px solid var(--border);
    color:var(--text); font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .ctrlbtn:active{ background:var(--border); }
  .ctrlbtn.playing{ background:var(--gold); color:#1B2743; border-color:var(--gold); }

  .gradebtns{ display:flex; gap:8px; padding:22px 20px 0; }
  .gradebtn{
    flex:1; padding:13px 4px; border-radius:14px; cursor:pointer; background:var(--panel);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    font-size:11.5px; font-weight:800; letter-spacing:0.03em; color:var(--text);
  }
  .gradebtn.again{ border:1.5px solid var(--red); }
  .gradebtn.good{ border:1.5px solid var(--green); }
  .gradebtn.perfect{ border:1.5px solid var(--gold); }
  .gradebtn .badge{ width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .gradebtn.again .badge{ background:var(--red); color:#fff; }
  .gradebtn.good .badge{ background:var(--green); color:#12321F; }
  .gradebtn.perfect .badge{ background:var(--gold); color:#1B2743; }
  .gradebtn:active{ opacity:0.8; }

  .settingspop{
    margin:18px 20px 0; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; display:flex; flex-direction:column; gap:14px;
  }
  .settingspop .row{ display:flex; justify-content:space-between; align-items:center; }
  .settingspop .row .t{ font-size:13px; font-weight:600; color:var(--text); }
  .settingspop .row .d{ font-size:11px; color:var(--text-soft); margin-top:2px; }
  .segbtns{ display:flex; gap:6px; }
  .segbtn{ padding:7px 12px; font-size:12px; border-radius:8px; border:1px solid var(--border); background:var(--panel-2); color:var(--text-soft); cursor:pointer; font-weight:600; }
  .segbtn.sel{ background:var(--gold); border-color:var(--gold); color:#1B2743; }
  .switch{ width:42px; height:24px; border-radius:14px; background:var(--panel-2); border:1px solid var(--border); position:relative; cursor:pointer; }
  .switch .knob{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--text-soft); transition:all .2s ease; }
  .switch.on{ background:var(--gold); border-color:var(--gold); }
  .switch.on .knob{ left:20px; background:#1B2743; }

  /* ---------- complete ---------- */
  .complete{ background:var(--panel); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); margin:10px 20px 0; padding:32px 24px; text-align:center; }
  .complete .title{ font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; color:var(--gold); }
  .complete .sub{ font-size:13px; color:var(--text-soft); margin-top:6px; }
  .resultrow{ display:flex; gap:10px; margin-top:20px; }
  .resultbox{ flex:1; border-radius:12px; padding:14px 6px; border:1px solid var(--border); }
  .resultbox.ok{ background:rgba(63,191,143,0.1); }
  .resultbox.ng{ background:rgba(226,99,122,0.1); }
  .resultbox.pf{ background:rgba(232,184,75,0.12); }
  .resultbox .n{ font-size:22px; font-weight:800; }
  .resultbox.ok .n{ color:var(--green); }
  .resultbox.ng .n{ color:var(--red); }
  .resultbox.pf .n{ color:var(--gold); }
  .resultbox .l{ font-size:10.5px; color:var(--text-soft); margin-top:2px; }

  /* ---------- stats ---------- */
  .section-title{ font-size:13px; font-weight:700; color:var(--text); margin:4px 2px; }
  .histlist{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .histrow{ display:flex; justify-content:space-between; align-items:center; padding:12px 16px; font-size:13px; border-bottom:1px solid var(--border); }
  .histrow:last-child{ border-bottom:none; }
  .histrow .d{ color:var(--text-soft); }
  .histrow .res .ok{ color:var(--green); font-weight:700; }
  .histrow .res .ng{ color:var(--red); font-weight:700; }
  .nodata{ font-size:12px; color:var(--text-soft); padding:16px; text-align:center; }

  /* ---------- settings screen ---------- */
  .settingrow{ background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; display:flex; flex-direction:column; gap:10px; }
  .settingrow .label{ font-size:13px; font-weight:600; color:var(--text); }
  .settingrow .desc{ font-size:12px; color:var(--text-soft); line-height:1.5; }
  .settingrow input[type=number]{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); font-size:14px; background:var(--panel-2); color:var(--text); }
  .settingrow .btn{ padding:12px; border-radius:10px; border:none; font-weight:700; font-size:13px; cursor:pointer; }
  .btn.primary{ background:var(--gold); color:#1B2743; }
  .btn.warn{ background:var(--red); color:#fff; }
  .btn.ghost{ background:var(--panel-2); color:var(--text); border:1px solid var(--border); }
  textarea.jsonbox{ width:100%; height:90px; border-radius:10px; border:1px solid var(--border); padding:10px; font-size:11px; font-family:monospace; background:var(--panel-2); color:var(--text); }

  footer.copy{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:var(--bg-bot); border-top:1px solid var(--border); text-align:center;
    font-size:10.5px; color:var(--text-soft); padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    max-width:480px; margin:0 auto;
  }

  .toast{
    position:fixed; left:50%; bottom:80px; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--border); color:var(--text); padding:10px 18px; border-radius:20px;
    font-size:12.5px; opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:100; white-space:nowrap;
  }
  .toast.show{ opacity:0.97; }

  @media (max-height:680px){
    .studycard .kr{ font-size:20px; }
    .answerbox{ padding:20px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<footer class="copy">© Dr. Hannjoo Lee, KSC/PCC · hannjoo@gmail.com</footer>

<script>

nswered his phone."}, {"kr": "잭은 전화가 울리기 전에 책을 읽기 시작했습니다 . 그래서 전화가 울렸을 때 그는 책을 읽고 있었습니다.", "en": "Jack began reading before his phone rang. So when his phone rang, he was reading."}, {"kr": "어제 아침에 무엇을 하셨나요? 우리는 테니스를 쳤습니다.", "en": "What did you do yesterday morning? We played tennis."}, {"kr": "잭은 어제 책을 읽었습니다.", "en": "Jack read a book yesterday."}, {"kr": "어젯밤에 TV로 경기를 보셨나요?", "en": "Did you watch the game on TV last night?"}, {"kr": "우리가 휴가를 가는 동안에는 비가 내리지 않았습니다 .", "en": "It didn't rain while we were on vacation."}, {"kr": "10시 30분에 무엇을 하고 있었나요? 우리는 테니스를 치고 있었습니다.", "en": "What were you doing at 10:30? We were playing tennis."}, {"kr": "잭이 책을 읽고 있을 때 전화가 울렸다.", "en": "Jack was reading a book when his phone rang."}, {"kr": "내가 전화했을 때 TV를 보고 있었나요?", "en": "Were you watching TV when I called you?"}, {"kr": "내가 일어났을 때 비가 내리지 않았다.", "en": "It wasn't raining when I got up."}, {"kr": "저는 오전 9시에 일을 시작해서 오후 4시 30분에 끝냈습니다. 오후 2시 30분에 저는 일하고 있었습니다.", "en": "I started work at 9:00 and finished at 4:30. At 2:30, I was working."}, {"kr": "우리가 나갔을 때 비가 내리고 있었습니다.", "en": "It was raining when we went out."}, {"kr": "오늘 아침에 에밀리와 샘을 봤어요. 그들은 버스 정류장에서 기다리고 있었습니다.", "en": "I saw Emily and Sam this morning. They were waiting at the bus stop."}, {"kr": "그레이스는 책을 읽다가 잠들었습니다.", "en": "Grace fell asleep while she was reading."}, {"kr": "저는 공장에서 일해요. 저는 슈퍼마켓에서 일해요. 저는 공장에서 일했었습니다.", "en": "I work in a factory. I work in a supermarket. I used to work in a factory."}, {"kr": "데이브는 공장에서 일했었습니다. 지금 그는 슈퍼마켓에서 일합니다.", "en": "Dave used to work in a factory. Now he works in a supermarket."}, {"kr": "저는 아주 긴 머리를 가졌었습니다.", "en": "I used to have very long hair."}, {"kr": "제가 어렸을 때는 초콜릿을 좋아했었습니다.", "en": "When I was a child, I used to like chocolate."}, {"kr": "저는 예전에는 책을 많이 읽었지만, 요즘은 별로 읽지 않습니다.", "en": "I used to read a lot of books, but I don't read much these days."}, {"kr": "리즈는 지금은 짧은 머리지만, 예전에는 매우 길었어요.", "en": "Liz has short hair now, but it used to be very long."}, {"kr": "그들은 우리와 같은 거리에 살았기 때문에 우리는 그들을 자주 보았지만, 요즘은 그들을 자주 볼 수 없습니다.", "en": "They used to live on the same street as us, so we used to see them a lot, but we don't see them much anymore."}, {"kr": "앨리슨은 피아노를 가지고 있었지만 몇 년 전에 팔았습니다.", "en": "Allison used to have a piano, but she sold it a few years ago."}, {"kr": "저는 예전에는 토마토를 좋아하지 않았지만, 지금은 좋아해요.", "en": "I didn't used to like tomatoes, but I like them now."}, {"kr": "여기로 오기 전에는 어디에 살았나요?", "en": "Where did you used to live before you came here?"}, {"kr": "저는 테니스를 쳤었고, 지금은 골프를 칩니다.", "en": "I used to play tennis, now I play golf."}, {"kr": "우리는 보통 일찍 일어납니다.", "en": "We usually get up early."}, {"kr": "멕시코시티에 가보셨나요? 네, 여러 번 그랬습니다.", "en": "Have you been to Mexico City? Yes, I have many times."}, {"kr": "일본에 가본 적이 있나요? 아니요, 일본에 가본 적이 없습니다.", "en": "Have you ever been to Japan? No, I've never been to Japan."}, {"kr": "프랑스에 가보셨나요? 아니요, 그렇지 않아요.", "en": "Have you been to France? No, I haven't."}, {"kr": "우리는 캐나다에는 가봤지만, 알래스카에는 가본 적이 없습니다.", "en": "We've been to Canada, but we haven't been to Alaska."}, {"kr": "메리는 흥미로운 사람이다. 그녀는 다양한 직업을 가졌고, 다양한 곳에서 살았습니다.", "en": "Mary is an interesting person. She has had many different jobs and has lived in many different places."}, {"kr": "저는 그 여자를 전에 본 적이 있는데, 어디서 본 건지 기억이 나지 않습니다.", "en": "I've seen that woman before, but I can't remember where."}, {"kr": "브라질은 월드컵에서 몇 번 우승했나요 ?", "en": "How many times has Brazil won the World Cup?"}, {"kr": "이 책을 읽어 보셨나요? 네, 두 번 읽었습니다.", "en": "Have you read this book? Yes, I've read it twice."}, {"kr": "미셸은 호주에 가본 적이 있나요? 네, 한 번요.", "en": "Has Michelle ever been to Australia? Yes, once."}, {"kr": "골프를 쳐본 적이 있나요? 네, 많이 플레이해요 .", "en": "Have you ever played golf? Yes, I play a lot."}, {"kr": "내 여동생은 비행기를 타 본 적이 없습니다.", "en": "My sister has never traveled by plane."}, {"kr": "저는 말을 타본 적이 없습니다.", "en": "I've never ridden a horse."}, {"kr": "저 남자는 누구야? 모르겠습니다. 저는 그를 전에 본 적이 없습니다.", "en": "Who is that man? I don't know. I've never seen him before."}, {"kr": "브라질에 머무신 지 얼마나 되셨나요 const TOTAL = SENTENCES.length;
const DAILY_TARGET = 20;
const BOX_INTERVALS = [1,2,4,7,15];
const STORAGE_KEY = 'giu_leitner_v1';

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function defaultState(){
  return {
    cursor: 0,
    cards: {},
    session: null,
    history: [],
    voice: { rate: 1, auto: true },
  };
}

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    merged.voice = Object.assign(defaultState().voice, parsed.voice||{});
    return merged;
  }catch(e){ return defaultState(); }
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ showToast('저장에 실패했습니다.'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------------- text-to-speech ---------------- */
let ttsBusy = false;
function speak(text, lang, rateOverride){
  if(!('speechSynthesis' in window)){ showToast('이 브라우저는 음성 재생을 지원하지 않습니다.'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = rateOverride || state.voice.rate || 1;
  ttsBusy = true;
  u.onend = ()=>{ ttsBusy=false; updatePlayingClass(false); };
  u.onerror = ()=>{ ttsBusy=false; updatePlayingClass(false); };
  updatePlayingClass(true);
  window.speechSynthesis.speak(u);
}
function updatePlayingClass(on){
  const b = document.getElementById('playBtn');
  if(b) b.classList.toggle('playing', on);
}

/* ---------------- scheduling logic ---------------- */

function getDueIds(){
  const today = todayStr();
  const due = [];
  for(const id in state.cards){
    const c = state.cards[id];
    if(c.nextDue <= today) due.push({id:Number(id), due:c.nextDue});
  }
  due.sort((a,b)=> a.due < b.due ? -1 : (a.due>b.due?1:0));
  return due.map(d=>d.id);
}

function pickNextBatch(excludeIds){
  const exclude = new Set(excludeIds||[]);
  const due = getDueIds().filter(id=>!exclude.has(id));
  let ids = due.slice(0, DAILY_TARGET);
  if(ids.length < DAILY_TARGET){
    let need = DAILY_TARGET - ids.length;
    let c = state.cursor;
    const newIds = [];
    while(need>0 && c < TOTAL){ newIds.push(c); c++; need--; }
    state.cursor = c;
    ids = ids.concat(newIds);
  }
  return ids;
}

function buildTodaySession(){
  const today = todayStr();
  const ids = pickNextBatch([]);
  state.session = { date: today, ids, idx:0, correct:0, wrong:0, perfect:0, completed: ids.length===0 };
  save();
}

function canExtendToday(){
  if(!state.session || state.session.date!==todayStr()) return false;
  return getDueIds().filter(id=>!state.session.ids.includes(id)).length>0 || state.cursor<TOTAL;
}

function extendSession(){
  const s = state.session;
  const more = pickNextBatch(s.ids);
  if(more.length===0) return false;
  s.ids = s.ids.concat(more);
  s.completed = false;
  save();
  return true;
}

function recordHistory(){
  const s = state.session;
  const entry = {date: s.date, total: s.ids.length, correct: s.correct, wrong: s.wrong, perfect: s.perfect||0};
  const idx = state.history.findIndex(h=>h.date===s.date);
  if(idx>=0) state.history[idx] = entry;
  else {
    state.history.push(entry);
    if(state.history.length>200) state.history.shift();
  }
}

function gradeCurrent(action){
  const s = state.session;
  const id = s.ids[s.idx];
  const today = s.date;
  let c = state.cards[id] || {box:0, nextDue:today};
  if(action==='perfect'){
    c.box = BOX_INTERVALS.length-1;
    s.correct++; s.perfect = (s.perfect||0)+1;
  } else if(action==='good'){
    c.box = Math.min(c.box+1, BOX_INTERVALS.length-1);
    s.correct++;
  } else {
    c.box = 0;
    s.wrong++;
  }
  c.nextDue = addDays(today, BOX_INTERVALS[c.box]);
  state.cards[id] = c;
  s.idx++;
  if(s.idx >= s.ids.length){
    s.completed = true;
    recordHistory();
  }
  save();
}

function masteryStats(){
  const boxCounts = [0,0,0,0,0];
  let studied = 0;
  for(const id in state.cards){
    const c = state.cards[id];
    boxCounts[c.box]++;
    studied++;
  }
  const notStarted = TOTAL - studied;
  return {boxCounts, studied, notStarted};
}

/* ---------------- rendering ---------------- */

const app = document.getElementById('app');
let route = 'home';
let revealed = false;
let showVoiceSettings = false;

function render(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(route==='home') renderHome();
  else if(route==='study') renderStudy();
  else if(route==='stats') renderStats();
  else if(route==='settings') renderSettings();
}

function header(title, back, customRight){
  const rightHtml = customRight ? customRight
    : (back? `<button class="icon-btn" onclick="goHome()">✕</button>` : `<button class="icon-btn" onclick="route='settings';render()">⚙</button>`);
  return `<header class="top">
    <div class="brand">${title}<small>GRAMMAR IN USE · LEITNER</small></div>
    ${rightHtml}
  </header>`;
}

function renderHome(){
  const {boxCounts, studied, notStarted} = masteryStats();
  const dueCount = getDueIds().length;
  const maxCount = Math.max(1, ...boxCounts);

  let ctaBig = '학습하기';
  let ctaSmall = `오늘 ${DAILY_TARGET}개 학습`;
  if(state.session && state.session.date===todayStr()){
    if(state.session.completed){
      if(canExtendToday()){
        ctaBig = '20개 더 학습하기';
        ctaSmall = `오늘 총 ${state.session.ids.length}개 완료 · 이어서 더 학습`;
      } else {
        ctaBig = '오늘 학습 완료 ✓';
        ctaSmall = `오늘 학습할 수 있는 문장을 모두 마쳤습니다`;
      }
    } else {
      ctaBig = '이어서 학습하기';
      ctaSmall = `${state.session.idx} / ${state.session.ids.length} 진행 중`;
    }
  }

  const shelfBooks = boxCounts.map((n,i)=>{
    const h = Math.round((n/maxCount)*100);
    return `<div class="book"><div class="num">${i+1}</div><div class="fill" style="height:${h}%"></div><div class="count">${n}</div></div>`;
  }).join('');

  app.innerHTML = `
    ${header('그래머 인 유스')}
    <main>
      <div class="shelf">
        <div class="shelf-title">라이트너 박스 현황</div>
        <div class="shelf-row">${shelfBooks}</div>
        <div class="shelf-caption"><span>박스 1 (초기)</span><span>박스 5 (숙달)</span></div>
      </div>
      <div class="pillrow">
        <div class="pill"><div class="n">${studied}</div><div class="l">학습 시작</div></div>
        <div class="pill"><div class="n">${dueCount}</div><div class="l">오늘 복습 대상</div></div>
        <div class="pill"><div class="n">${notStarted}</div><div class="l">아직 안 본 문장</div></div>
      </div>
      <button class="cta" onclick="startStudy()">
        <div class="big">${ctaBig}</div>
        <div class="small">${ctaSmall}</div>
      </button>
      <div class="secrow">
        <div class="secbtn" onclick="route='stats';render()">📊 통계</div>
        <div class="secbtn" onclick="route='settings';render()">⚙ 설정</div>
        <div class="secbtn" onclick="triggerHomeImport()">⬆ 진도 불러오기</div>
      </div>
      <input type="file" id="homeImportInput" accept="application/json,.json" style="display:none" onchange="handleHomeImportFile(event)">
      ${notStarted===0 && dueCount===0 ? `<div class="emptynote">전체 ${TOTAL}개 문장을 모두 학습했고, 오늘 복습할 문장은 없습니다. 내일 다시 확인해 보세요.</div>` : ''}
    </main>
  `;
}

function startStudy(){
  if(!state.session || state.session.date!==todayStr()){
    buildTodaySession();
  } else if(state.session.completed){
    const extended = extendSession();
    if(!extended){ showToast('오늘 학습할 수 있는 문장을 모두 마쳤습니다.'); return; }
  }
  if(state.session.ids.length===0){ showToast('오늘 학습할 문장이 없습니다.'); return; }
  revealed = false; showVoiceSettings = false;
  route='study'; render();
}

function goHome(){ route='home'; render(); }

function endStudy(){
  exportData();
  showToast('학습 현황을 백업하고 종료합니다.');
  goHome();
}

function renderStudy(){
  const s = state.session;
  if(!s){ goHome(); return; }
  if(s.completed){ renderComplete(); return; }

  const item = SENTENCES[s.ids[s.idx]];
  const cardNum = s.ids[s.idx]+1;
  const box = (state.cards[s.ids[s.idx]] ? state.cards[s.ids[s.idx]].box : 0);

  const dots = [0,1,2,3,4].map(i=>`<div class="dot ${i===box?'active':''}"></div>`).join('');

  app.innerHTML = `
    ${header('학습하기', true, `<button class="endbtn" onclick="endStudy()">학습종료</button>`)}
    <div class="studytop"><div class="daytag">오늘 ${s.idx+1} / ${s.ids.length}</div></div>
    <div class="dots">${dots}</div>
    <div class="studycard">
      <div class="kr">${escapeHtml(item.kr)}</div>
      <div class="meta">${cardNum}번 · Box ${box+1} / 5</div>
    </div>
    <div class="answerbox" id="answerBox">
      ${revealed
        ? `<div class="en">${escapeHtml(item.en)}</div>`
        : `<div class="hint">영어로 말해본 뒤, 정답을 확인하세요</div>`}
    </div>
    <div class="ctrlrow">
      <button class="ctrlbtn" id="playBtn" onclick="event.stopPropagation();playCurrent()">▶</button>
      <button class="ctrlbtn" onclick="event.stopPropagation();replaySlow()">↻</button>
      <button class="ctrlbtn" onclick="event.stopPropagation();toggleVoiceSettings()">⚙</button>
    </div>
    ${showVoiceSettings ? voiceSettingsHtml() : ''}
    ${revealed ? `
      <div class="gradebtns">
        <button class="gradebtn again" onclick="answer('again')"><span class="badge">↺</span>AGAIN</button>
        <button class="gradebtn good" onclick="answer('good')"><span class="badge">✓</span>GOOD</button>
        <button class="gradebtn perfect" onclick="answer('perfect')"><span class="badge">★</span>PERFECT</button>
      </div>
    ` : ''}
  `;
  document.getElementById('answerBox').addEventListener('click', ()=>{ if(!revealed) reveal(); });
}

function voiceSettingsHtml(){
  const r = state.voice.rate;
  return `
    <div class="settingspop">
      <div class="row">
        <div><div class="t">읽기 속도</div><div class="d">음성 재생 빠르기를 조절합니다.</div></div>
        <div class="segbtns">
          <button class="segbtn ${r===0.75?'sel':''}" onclick="setRate(0.75)">느리게</button>
          <button class="segbtn ${r===1?'sel':''}" onclick="setRate(1)">보통</button>
          <button class="segbtn ${r===1.25?'sel':''}" onclick="setRate(1.25)">빠르게</button>
        </div>
      </div>
      <div class="row">
        <div><div class="t">자동 재생</div><div class="d">정답을 확인할 때 영어 문장을 자동으로 읽어줍니다.</div></div>
        <div class="switch ${state.voice.auto?'on':''}" onclick="toggleAuto()"><div class="knob"></div></div>
      </div>
    </div>
  `;
}

function toggleVoiceSettings(){ showVoiceSettings = !showVoiceSettings; render(); }
function setRate(r){ state.voice.rate = r; save(); render(); }
function toggleAuto(){ state.voice.auto = !state.voice.auto; save(); render(); }

function playCurrent(){
  const s = state.session;
  const item = SENTENCES[s.ids[s.idx]];
  if(!revealed){ revealed = true; render(); }
  speak(item.en, 'en-US');
}
function replaySlow(){
  const s = state.session;
  const item = SENTENCES[s.ids[s.idx]];
  if(!revealed){ revealed = true; render(); }
  speak(item.en, 'en-US', 0.7);
}

function reveal(){
  revealed = true;
  render();
  if(state.voice.auto){
    const s = state.session;
    const item = SENTENCES[s.ids[s.idx]];
    setTimeout(()=>speak(item.en,'en-US'), 200);
  }
}
function answer(action){
  gradeCurrent(action);
  revealed = false;
  render();
}

function renderComplete(){
  const s = state.session;
  const more = canExtendToday();
  app.innerHTML = `
    ${header('학습하기', true)}
    <main>
      <div class="complete">
        <div class="title">오늘 학습 완료!</div>
        <div class="sub">${s.date} · 총 ${s.ids.length}개 문장</div>
        <div class="resultrow">
          <div class="resultbox ng"><div class="n">${s.wrong}</div><div class="l">AGAIN</div></div>
          <div class="resultbox ok"><div class="n">${s.correct - (s.perfect||0)}</div><div class="l">GOOD</div></div>
          <div class="resultbox pf"><div class="n">${s.perfect||0}</div><div class="l">PERFECT</div></div>
        </div>
      </div>
      ${more ? `
        <button class="cta" onclick="extendAndContinue()">
          <div class="big">20개 더 학습하기</div>
          <div class="small">오늘 학습을 이어서 계속합니다</div>
        </button>
      ` : `
        <div class="emptynote">오늘 학습할 수 있는 문장을 모두 마쳤습니다. 내일 다시 확인해 보세요.</div>
      `}
      <button class="cta" style="${more? 'background:var(--panel-2);color:var(--text);box-shadow:none;border:1px solid var(--border);':''}" onclick="goHome()">
        <div class="big">홈으로</div>
        <div class="small">내일 또 만나요</div>
      </button>
    </main>
  `;
}

function extendAndContinue(){
  const extended = extendSession();
  if(!extended){ showToast('오늘 학습할 수 있는 문장을 모두 마쳤습니다.'); render(); return; }
  revealed = false; showVoiceSettings = false;
  render();
}

function renderStats(){
  const {boxCounts, studied, notStarted} = masteryStats();
  const hist = state.history.slice().reverse().slice(0,30);
  const histHtml = hist.length ? hist.map(h=>`
    <div class="histrow">
      <span class="d">${h.date}</span>
      <span class="res"><span class="ok">✓${h.correct}</span>&nbsp;&nbsp;<span class="ng">✗${h.wrong}</span>&nbsp;&nbsp;/ ${h.total}</span>
    </div>
  `).join('') : `<div class="nodata">아직 학습 기록이 없습니다.</div>`;

  app.innerHTML = `
    ${header('통계', true)}
    <main>
      <div class="pillrow">
        <div class="pill"><div class="n">${TOTAL}</div><div class="l">전체 문장</div></div>
        <div class="pill"><div class="n">${studied}</div><div class="l">학습 시작</div></div>
        <div class="pill"><div class="n">${boxCounts[4]}</div><div class="l">박스5 (숙달)</div></div>
      </div>
      <div class="pillrow">
        <div class="pill"><div class="n">${notStarted}</div><div class="l">미학습</div></div>
        <div class="pill"><div class="n">${state.history.length}</div><div class="l">누적 학습일</div></div>
        <div class="pill"><div class="n">${Math.round((boxCounts[4]/Math.max(1,studied))*100)}%</div><div class="l">숙달 비율</div></div>
      </div>
      <div class="section-title">최근 학습 기록</div>
      <div class="histlist">${histHtml}</div>
    </main>
  `;
}

function renderSettings(){
  app.innerHTML = `
    ${header('설정', true)}
    <main>
      <div class="settingrow">
        <div class="label">음성 읽기 속도</div>
        <div class="desc">학습 화면에서 재생 버튼(▶)을 눌렀을 때 읽는 속도입니다.</div>
        <div class="segbtns">
          <button class="segbtn ${state.voice.rate===0.75?'sel':''}" onclick="state.voice.rate=0.75;save();renderSettings()">느리게</button>
          <button class="segbtn ${state.voice.rate===1?'sel':''}" onclick="state.voice.rate=1;save();renderSettings()">보통</button>
          <button class="segbtn ${state.voice.rate===1.25?'sel':''}" onclick="state.voice.rate=1.25;save();renderSettings()">빠르게</button>
        </div>
      </div>
      <div class="settingrow">
        <div class="label">자동 음성 재생</div>
        <div class="desc">정답을 확인할 때 영어 문장을 자동으로 읽어줍니다.</div>
        <div class="switch ${state.voice.auto?'on':''}" onclick="state.voice.auto=!state.voice.auto;save();renderSettings()"><div class="knob"></div></div>
      </div>
      <div class="settingrow">
        <div class="label">데이터 내보내기</div>
        <div class="desc">현재 학습 진행 상황을 JSON 파일로 저장합니다. 기기를 바꾸거나 백업할 때 사용하세요.</div>
        <button class="btn primary" onclick="exportData()">JSON으로 내보내기</button>
      </div>
      <div class="settingrow">
        <div class="label">데이터 가져오기</div>
        <div class="desc">이전에 내보낸 JSON 파일 내용을 붙여넣고 불러오세요. 현재 진행 상황을 덮어씁니다.</div>
        <textarea class="jsonbox" id="importBox" placeholder="여기에 JSON 내용을 붙여넣으세요"></textarea>
        <button class="btn primary" onclick="importData()">가져오기</button>
      </div>
      <div class="settingrow">
        <div class="label">학습 시작 지점 변경</div>
        <div class="desc">새 문장을 몇 번째부터 시작할지 지정합니다. (현재: ${state.cursor+1}번째, 전체 ${TOTAL}개)</div>
        <input type="number" id="cursorInput" min="1" max="${TOTAL}" value="${state.cursor+1}">
        <button class="btn ghost" onclick="setCursor()">적용</button>
      </div>
      <div class="settingrow">
        <div class="label">진행 상황 초기화</div>
        <div class="desc">모든 학습 기록과 박스 상태가 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</div>
        <button class="btn warn" onclick="resetAll()">전체 초기화</button>
      </div>
    </main>
  `;
}

function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `giu-leitner-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('JSON 파일로 내보냈습니다.');
}

function applyImportedJSON(text){
  try{
    const parsed = JSON.parse(text);
    if(typeof parsed.cursor !== 'number' || typeof parsed.cards !== 'object'){ throw new Error('형식 오류'); }
    state = Object.assign(defaultState(), parsed);
    state.voice = Object.assign(defaultState().voice, parsed.voice||{});
    save();
    showToast('학습 진도를 불러왔습니다.');
    return true;
  }catch(e){
    showToast('올바른 백업 파일이 아닙니다.');
    return false;
  }
}

function importData(){
  const box = document.getElementById('importBox');
  if(applyImportedJSON(box.value)){ route='home'; render(); }
}

function triggerHomeImport(){
  document.getElementById('homeImportInput').click();
}
function handleHomeImportFile(evt){
  const file = evt.target.files && evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    if(applyImportedJSON(e.target.result)){ route='home'; render(); }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

function setCursor(){
  const v = parseInt(document.getElementById('cursorInput').value, 10);
  if(isNaN(v) || v<1 || v>TOTAL){ showToast('1~'+TOTAL+' 사이의 값을 입력하세요.'); return; }
  state.cursor = v-1;
  save();
  showToast('시작 지점이 변경되었습니다.');
  renderSettings();
}

function resetAll(){
  if(!confirm('정말 모든 학습 기록을 초기화할까요? 되돌릴 수 없습니다.')) return;
  state = defaultState();
  save();
  showToast('초기화되었습니다.');
  goHome();
}

function escapeHtml(str){
  return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}

render();
</script>
</body>
</html>
